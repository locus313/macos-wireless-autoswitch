name: Feature Request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check the README to confirm this isn't already supported.

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this solve? What's your current workaround?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to see added or changed.
    validations:
      required: true

  - type: input
    id: adapter
    attributes:
      label: Adapter or Hardware Involved (if applicable)
      placeholder: e.g. USB-C Dock, AX88179A, Thunderbolt 4
